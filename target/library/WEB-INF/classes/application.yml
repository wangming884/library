server:
  port: 8080
  servlet:
    context-path: /library

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/library_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:13479487829Xj}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      # Do not run schema.sql/data.sql on every startup. Those scripts drop tables,
      # so automatic init would erase newly registered readers after a restart.
      mode: never
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      encoding: UTF-8
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.library.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: Y2xpZW50LWxpYnJhcnktbWFuYWdlbWVudC1zZWNyZXQta2V5LTIwMjQtc3ByaW5nLWJvb3Q
  expiration: 86400000

logging:
  level:
    com.library: debug
    com.baomidou: debug
